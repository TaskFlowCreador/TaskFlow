<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Flow v1.0 - Kanban Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Indie+Flower&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

    <style>
        /* [Aquí van todos los estilos que ya tenías...] */
        :root {
            --bg-color: #f0f4f8; --text-color: #2d3748; --grid-dot: #cbd5e0;
            --glass-bg: rgba(255, 255, 255, 0.65); --glass-border: 1px solid rgba(255, 255, 255, 0.6);
            --column-header-bg: rgba(255, 255, 255, 0.8); --shadow-soft: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
            --accent-color: #667eea; --btn-bg: #fff; --btn-text: #2d3748;
            --tape-color: rgba(255, 255, 255, 0.5); --empty-text: #a0aec0;
            --quote-color: #555; --modal-bg: rgba(255, 255, 255, 0.95);
        }
        .dark-mode {
            --bg-color: #1a202c; --text-color: #e2e8f0; --grid-dot: #4a5568;
            --glass-bg: rgba(26, 32, 44, 0.6); --glass-border: 1px solid rgba(255, 255, 255, 0.08);
            --column-header-bg: rgba(45, 55, 72, 0.8); --shadow-soft: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
            --accent-color: #a3bffa; --btn-bg: #2d3748; --btn-text: #e2e8f0;
            --tape-color: rgba(255, 255, 255, 0.15); --empty-text: #5f6c80;
            --quote-color: #aaa; --modal-bg: rgba(30, 41, 59, 0.95);
        }
        * { box-sizing: border-box; transition: background-color 0.4s ease; }
        body {
            font-family: 'Nunito', sans-serif; background-color: var(--bg-color);
            background-image: radial-gradient(var(--grid-dot) 1.5px, transparent 1.5px);
            background-size: 25px 25px; margin: 0; color: var(--text-color); min-height: 100vh;
            display: flex; flex-direction: column;
        }
        header {
            padding: 10px 20px; display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; background: var(--glass-bg); backdrop-filter: blur(12px);
            border-bottom: var(--glass-border); position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-family: 'Indie Flower', cursive; font-size: 2.5rem; text-align: center; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .controls { display: flex; gap: 8px; justify-content: flex-end; }
        .add-task-area { padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #task-input { padding: 12px 20px; width: 300px; border-radius: 30px; border: 1px solid var(--grid-dot); outline: none; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; padding: 20px; flex-grow: 1; }
        .column { background: var(--glass-bg); border-radius: 20px; padding: 15px; min-height: 400px; display: flex; flex-direction: column; }
        .column-header { text-align: center; font-weight: 800; margin-bottom: 15px; display: flex; justify-content: center; gap: 10px; }
        .task-list { flex-grow: 1; min-height: 200px; }
        .task { 
            background: #fef3c7; padding: 15px; margin-bottom: 15px; border-radius: 5px; 
            cursor: grab; font-family: 'Indie Flower', cursive; font-size: 1.2rem;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1); position: relative;
        }
        .task:active { cursor: grabbing; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; cursor: pointer; display: inline-block; margin: 0 2px; }
        .selected { border: 2px solid black; }
        .bg-yellow { background: #fef3c7; } .bg-blue { background: #bfdbfe; } .bg-green { background: #bbf7d0; }
        .add-btn { background: #667eea; color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div></div>
        <div class="logo">✨ Task Flow</div>
        <div class="controls">
            <button class="add-btn" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <div class="add-task-area">
        <div id="quote-display" class="motivation-quote">"El éxito es la suma de pequeños esfuerzos diarios."</div>
        <div class="input-wrapper">
            <input type="text" id="task-input" placeholder="Nueva tarea...">
            <button class="add-btn" onclick="addTask()">+ Agregar</button>
        </div>
    </div>

    <div class="board">
        <div class="column" ondragover="event.preventDefault()" ondrop="drop(event, 'todo')">
            <div class="column-header">Por Hacer</div>
            <div class="task-list" id="todo"></div>
        </div>
        <div class="column" ondragover="event.preventDefault()" ondrop="drop(event, 'doing')">
            <div class="column-header">En Progreso</div>
            <div class="task-list" id="doing"></div>
        </div>
        <div class="column" ondragover="event.preventDefault()" ondrop="drop(event, 'done')">
            <div class="column-header">Hecho</div>
            <div class="task-list" id="done"></div>
        </div>
    </div>

    <div style="position: fixed; bottom: 20px; right: 20px; display: flex; flex-direction: column; gap: 10px; z-index: 1000;">
        <a href="https://paypal.me/TU_USUARIO" target="_blank" style="background: #0070BA; color: white; padding: 10px 20px; border-radius: 50px; text-decoration: none; font-weight: bold; font-family: sans-serif;">💙 PayPal</a>
        <div style="background: #FCD535; padding: 10px; border-radius: 10px; font-size: 10px; font-family: sans-serif;">Binance: TU_BILLETERA_AQUI</div>
    </div>

    <script>
        // --- LÓGICA DE LA APLICACIÓN ---
        function addTask() {
            const input = document.getElementById('task-input');
            if (!input.value) return;
            createTaskCard(input.value, 'todo');
            input.value = '';
            saveData();
        }

        function createTaskCard(text, columnId) {
            const card = document.createElement('div');
            card.className = 'task';
            card.draggable = true;
            card.innerText = text;
            card.id = 'task-' + Date.now();
            card.ondragstart = (e) => e.dataTransfer.setData('text', card.id);
            
            // Botón eliminar
            const delBtn = document.createElement('button');
            delBtn.innerText = '🗑️';
            delBtn.style = 'position:absolute; top:5px; right:5px; border:none; background:none; cursor:pointer;';
            delBtn.onclick = () => { card.remove(); saveData(); };
            card.appendChild(delBtn);

            document.getElementById(columnId).appendChild(card);
        }

        function drop(e, columnId) {
            e.preventDefault();
            const id = e.dataTransfer.getData('text');
            const card = document.getElementById(id);
            document.getElementById(columnId).appendChild(card);
            if(columnId === 'done') confetti();
            saveData();
        }

        function toggleTheme() {
            document.body.classList.toggle('dark-mode');
        }

        function saveData() {
            const data = {
                todo: document.getElementById('todo').innerText,
                doing: document.getElementById('doing').innerText,
                done: document.getElementById('done').innerText
            };
            localStorage.setItem('taskflow_data', JSON.stringify(data));
        }

        // Cargar datos al abrir
        window.onload = () => {
            const saved = localStorage.getItem('taskflow_data');
            if(saved) {
                console.log("Datos cargados");
            }
        }
    </script>
</body>
</html>
